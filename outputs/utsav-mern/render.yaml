services:
  - type: web_service
    name: utsav-server
    env: node
    plan: free
    root: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: CLIENT_ORIGIN
        value: "http://127.0.0.1:5175"
  - type: static_site
    name: utsav-client
    env: static
    plan: free
    root: client
    buildCommand: npm run build
    publishPath: dist
