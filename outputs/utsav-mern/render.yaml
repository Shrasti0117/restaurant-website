services:
  - type: web_service
    name: utsav-server
    env: node
    plan: free
    root: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: CLIENT_ORIGIN
        value: "https://restaurant-website-1-se3v.onrender.com"
      - key: MONGO_URI
        scope: secret
  - type: static_site
    name: utsav-client
    env: static
    plan: free
    root: client
    buildCommand: npm run build
    publishPath: dist
